<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECHOBASE Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui, sans-serif; background:#0d0d14; color:white; margin:0; }
  header { padding:12px; background:#12121c; text-align:center; font-size:22px; font-weight:bold; }
  .container { display:flex; height:calc(100vh - 60px); }
  .userList { width:200px; background:#1a1a2a; overflow-y:auto; padding:10px; }
  .userList div { padding:8px; cursor:pointer; border-bottom:1px solid #222; }
  .userList div:hover { background:#2a2a4a; }
  .chatArea { flex:1; display:flex; flex-direction:column; }
  #messages { flex:1; overflow-y:auto; padding:10px; }
  .message { margin-bottom:8px; }
  .message strong { color:#6a5cff; }
  .chatInput { display:flex; }
  .chatInput input { flex:1; padding:10px; border:none; border-radius:6px 0 0 6px; }
  .chatInput button { padding:10px; border:none; background:#6a5cff; color:white; border-radius:0 6px 6px 0; cursor:pointer; }
</style>
</head>
<body>

<header>ECHOBASE Chat</header>

<div class="container">
  <div class="userList" id="userList"></div>
  <div class="chatArea">
    <div id="messages"></div>
    <div class="chatInput">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Example username (replace with login system)
  const username = prompt("Enter your username") || "Guest";

  // Load all users
  const usersRef = db.ref("users");
  const userListDiv = document.getElementById("userList");
  usersRef.on("value", snapshot => {
    userListDiv.innerHTML = "";
    const users = snapshot.val() || {};
    Object.keys(users).forEach(u => {
      if(u === username) return; // skip self
      const div = document.createElement("div");
      div.innerText = u;
      div.onclick = () => selectUser(u);
      userListDiv.appendChild(div);
    });
  });

  // Save self to users
  usersRef.child(username).set({ online:true });

  let currentChatUser = null;

  function selectUser(user){
    currentChatUser = user;
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";
    listenMessages(user);
  }

  function listenMessages(toUser){
    const chatId = [username, toUser].sort().join("_");
    db.ref("chats/" + chatId).on("value", snapshot => {
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";
      const msgs = snapshot.val() || {};
      Object.values(msgs).forEach(msg => {
        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `<strong>${msg.sender}:</strong> ${msg.message}`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    });
  }

  function sendMessage(){
    const input = document.getElementById("messageInput");
    if(!input.value.trim() || !currentChatUser) return;
    const chatId = [username, currentChatUser].sort().join("_");
    db.ref("chats/" + chatId).push({
      sender: username,
      message: input.value,
      timestamp: Date.now()
    });
    input.value = "";
  }
</script>

</body>
</html>
