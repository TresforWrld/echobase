<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECHOBASE • Chat & DM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background-color: #0d0d14;
  color: white;
  background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9Ijg4IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXR0ZXJuIGlkPSJoZXgiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBvbHlnb24gcG9pbnRzPSIyMCwwIDQwLDEwIDQwLDI1IDIwLDM1IDAsMjUgMCwxMCIgc3Ryb2tlPSIjMjIyMjQ0IiBmaWxsPSJub25lIiBzdHJva2Utd2lkdGg9IjEuMiIvPjwvcGF0ZXJuPjxzdmcgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNoZXgpIi8+PC9zdmc+');
  background-repeat: repeat;
  background-size: 70px 60px;
}

/* ===== HEADER ===== */
header {
  padding: 14px;
  background: #12121c;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 {
  font-size: 18px;
  letter-spacing: 2px;
}

#statusText {
  font-size: 12px;
  color: #aaa;
}

header button {
  background: none;
  border: none;
  color: #6a5cff;
  font-size: 14px;
  cursor: pointer;
}

/* ===== CHAT BOX ===== */
#chatBox {
  padding: 12px;
  padding-bottom: 120px;
  overflow-y: auto;
  max-height: calc(100vh - 120px);
}

.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  background: rgba(26,26,42,0.9);
  clip-path: polygon(
    10% 0%, 90% 0%, 100% 50%,
    90% 100%, 10% 100%, 0% 50%
  );
}

.message.me {
  margin-left: auto;
  background: rgba(106,92,255,0.9);
}

.user {
  font-size: 11px;
  opacity: 0.8;
  margin-bottom: 4px;
}

/* ===== INPUT BAR ===== */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #12121c;
  padding: 12px;
  display: flex;
  gap: 10px;
}

#messageInput {
  flex: 1;
  padding: 12px;
  background: rgba(26,26,42,0.9);
  color: white;
  border: none;
  outline: none;
  font-size: 14px;
  clip-path: polygon(
    3% 0%, 97% 0%, 100% 50%,
    97% 100%, 3% 100%, 0% 50%
  );
}

#sendBtn {
  width: 52px;
  background: #6a5cff;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  clip-path: polygon(
    25% 0%, 75% 0%, 100% 50%,
    75% 100%, 25% 100%, 0% 50%
  );
}

/* ===== INBOX / DM LIST ===== */
#inbox {
  padding: 12px;
}

.dmUser {
  padding: 10px;
  background: rgba(26,26,42,0.85);
  border-radius: 6px;
  margin-bottom: 8px;
  cursor: pointer;
}

.dmUser:hover {
  background: rgba(42,42,66,0.9);
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1 id="pageTitle">ECHOBASE • Chat</h1>
  <div id="statusText">● Connecting...</div>
  <button id="backBtn" onclick="goBack()" class="hidden">← Back</button>
</header>

<!-- Main Chat Box -->
<div id="chatBox"></div>

<!-- Inbox / DM List -->
<div id="inbox" class="hidden"></div>

<div id="inputBar">
  <input id="messageInput" placeholder="Send an echo..." />
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
/* ===== USER ===== */
let username = localStorage.getItem("echobase_username");
if (!username) {
  username = prompt("Username:") || "Guest";
  localStorage.setItem("echobase_username", username);
}

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== ONLINE STATUS ===== */
const statusText = document.getElementById("statusText");
const presenceRef = db.ref("presence/" + username);
const connectedRef = db.ref(".info/connected");

connectedRef.on("value", snap => {
  if (snap.val() === true) {
    presenceRef.onDisconnect().set({ online: false, lastSeen: Date.now() });
    presenceRef.set({ online: true, lastSeen: Date.now() });
  }
});

presenceRef.on("value", snap => {
  if (!snap.exists()) return;
  if (snap.val().online) {
    statusText.innerHTML = "🟢 Online";
    statusText.style.color = "#4cff6a";
  } else {
    statusText.innerHTML = "⚪ Offline";
    statusText.style.color = "#aaa";
  }
});

/* ===== CHAT MODE ===== */
let currentDM = null; // null = main chat

const chatBox = document.getElementById("chatBox");
const inboxDiv = document.getElementById("inbox");
const pageTitle = document.getElementById("pageTitle");
const backBtn = document.getElementById("backBtn");

function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  let ref;
  if(currentDM) {
    const users = [username, currentDM].sort().join("_");
    ref = db.ref("dm/" + users);
  } else {
    ref = db.ref("echobase_chat");
  }

  ref.push({
    user: username,
    text: text,
    time: Date.now()
  });

  input.value = "";
}

/* ===== RECEIVE ===== */
function loadChat() {
  chatBox.innerHTML = "";
  let ref;
  if(currentDM) {
    const users = [username, currentDM].sort().join("_");
    ref = db.ref("dm/" + users);
  } else {
    ref = db.ref("echobase_chat");
  }

  ref.limitToLast(100).on("child_added", snap => {
    const msg = snap.val();
    const div = document.createElement("div");
    div.className = "message" + (msg.user === username ? " me" : "");
    div.innerHTML = `<div class="user">${msg.user}</div><div>${msg.text}</div>`;
    chatBox.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
  });
}

/* ===== INBOX ===== */
function loadInbox() {
  chatBox.classList.add("hidden");
  inboxDiv.classList.remove("hidden");
  backBtn.classList.remove("hidden");
  pageTitle.innerText = "ECHOBASE • Inbox";
  inboxDiv.innerHTML = "";

  db.ref("dm").once("value", snap => {
    const allDMs = snap.val() || {};
    let usersSet = new Set();

    Object.keys(allDMs).forEach(key => {
      const users = key.split("_");
      if(users.includes(username)) {
        const other = users.find(u => u !== username) || username; // self-DM fallback
        usersSet.add(other);
      }
    });

    usersSet.forEach(user => {
      const div = document.createElement("div");
      div.className = "dmUser";
      div.innerText = user + (user===username ? " (Self)" : "");
      div.onclick = () => openDM(user);
      inboxDiv.appendChild(div);
    });
  });
}

function openDM(user) {
  currentDM = user;
  chatBox.classList.remove("hidden");
  inboxDiv.classList.add("hidden");
  pageTitle.innerText = "DM: " + (user===username ? "Self" : user);
  backBtn.classList.remove("hidden");
  chatBox.innerHTML = "";
  loadChat();
}

function goBack() {
  if(currentDM) {
    currentDM = null;
    chatBox.innerHTML = "";
    inboxDiv.classList.add("hidden");
    pageTitle.innerText = "ECHOBASE • Chat";
    backBtn.classList.add("hidden");
    loadChat();
  } else {
    loadInbox();
  }
}

/* ===== INITIAL LOAD ===== */
loadChat();
</script>
</body>
</html>
