<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECHOBASE • Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background-color: #0d0d14;
  color: white;

  /* Hexagonal background */
  background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9Ijg4IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXR0ZXJuIGlkPSJoZXgiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBvbHlnb24gcG9pbnRzPSIyMCwwIDQwLDEwIDQwLDI1IDIwLDM1IDAsMjUgMCwxMCIgc3Ryb2tlPSIjMjIyMjQ0IiBmaWxsPSJub25lIiBzdHJva2Utd2lkdGg9IjEuMiIvPjwvcGF0dGVybj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2hleCkiLz48L3N2Zz4=');
  background-repeat: repeat;
  background-size: 70px 60px;
}

/* ===== HEADER ===== */
header {
  padding: 14px;
  background: #12121c;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 {
  font-size: 20px;
  letter-spacing: 2px;
}

header button {
  background: none;
  border: none;
  color: #6a5cff;
  font-size: 14px;
  cursor: pointer;
}

/* ===== CHAT AREA ===== */
#chatBox {
  padding: 12px;
  padding-bottom: 120px;
}

.message {
  max-width: 75%;
  margin-bottom: 12px;
  padding: 10px 14px;
  background: rgba(26,26,42,0.9);
  clip-path: polygon(
    10% 0%, 90% 0%, 100% 50%,
    90% 100%, 10% 100%, 0% 50%
  );
}

.message.me {
  margin-left: auto;
  background: rgba(106,92,255,0.9);
}

.user {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 4px;
}

/* ===== INPUT BAR ===== */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #12121c;
  padding: 12px;
  display: flex;
  gap: 10px;
}

#messageInput {
  flex: 1;
  padding: 12px;
  background: rgba(26,26,42,0.9);
  color: white;
  border: none;
  outline: none;
  font-size: 14px;

  /* Hex long input */
  clip-path: polygon(
    3% 0%, 97% 0%, 100% 50%,
    97% 100%, 3% 100%, 0% 50%
  );
}

#sendBtn {
  width: 52px;
  background: #6a5cff;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;

  /* Hex send button */
  clip-path: polygon(
    25% 0%, 75% 0%, 100% 50%,
    75% 100%, 25% 100%, 0% 50%
  );
}
</style>
</head>

<body>

<header>
  <h1>ECHOBASE • CHAT</h1>
  <button onclick="goBack()">← Feed</button>
</header>

<div id="chatBox"></div>

<div id="inputBar">
  <input id="messageInput" placeholder="Send an echo..." />
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
/* ===== USER ===== */
let username = localStorage.getItem("echobase_username");
if (!username) {
  username = prompt("Username:") || "Guest";
  localStorage.setItem("echobase_username", username);
}

/* ===== FIREBASE ===== */
/* 🔥 REPLACE WITH YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref("echobase_chat");

/* ===== SEND MESSAGE ===== */
function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  chatRef.push({
    user: username,
    text: text,
    time: Date.now()
  });

  input.value = "";
}

/* ===== RECEIVE ===== */
chatRef.limitToLast(100).on("child_added", snap => {
  const msg = snap.val();
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "message" + (msg.user === username ? " me" : "");

  div.innerHTML = `
    <div class="user">${msg.user}</div>
    <div>${msg.text}</div>
  `;

  box.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
});

/* ===== NAV ===== */
function goBack() {
  window.location.href = "index.html";
}
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</body>
</html>
