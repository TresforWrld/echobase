<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ECHOBASE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0d0d14;
      color: white;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #12121c;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* Left: PFP + username */
    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    #userPFP {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    #usernameDisplay {
      font-size: 16px;
      font-weight: bold;
      color: #8f8fff;
    }

    /* Center: App name */
    .appName {
      font-size: 20px;
      font-weight: bold;
      color: white;
      text-align: center;
      flex-grow: 1;
    }

    /* Container & Posts */
    .container {
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #1a1a2a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #6a5cff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }

    .post {
      background: #151525;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .user {
      font-weight: bold;
      color: #8f8fff;
    }

    /* Profile modal */
    #profileModal {
      display: none;
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2a;
      border-radius: 8px;
      padding: 16px;
      z-index: 200;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    #profileModal img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      margin-bottom: 8px;
    }
    #profileModal button {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <!-- Left: Profile -->
  <div class="profile" id="profileBtn">
    <img id="userPFP" src="" alt="PFP">
    <div id="usernameDisplay"></div>
  </div>

  <!-- Center: App Name -->
  <div class="appName">ECHOBASE</div>
</header>

<!-- Profile Modal -->
<div id="profileModal">
  <img id="modalPFP" src="" alt="PFP">
  <div id="modalUsername"></div>
  <button onclick="changePFP()">Change Profile Photo</button>
  <button onclick="closeProfile()">Close</button>
</div>

<div class="container">
  <textarea id="echoInput" placeholder="What’s your echo?"></textarea>
  <button onclick="postEcho()">Echo</button>
  <div id="feed"></div>
</div>

<script>
  // Load username and profile photo
  let username = localStorage.getItem("echobase_username");
  let pfp = localStorage.getItem("echobase_pfp");

  if (!username) {
    username = prompt("Choose a username for ECHOBASE:") || "Guest";
    localStorage.setItem("echobase_username", username);
  }

  document.getElementById("usernameDisplay").innerText = "@" + username;

  const userPFPImg = document.getElementById("userPFP");
  const modalPFP = document.getElementById("modalPFP");
  const modalUsername = document.getElementById("modalUsername");

  function updatePFP(src){
    userPFPImg.src = src;
    modalPFP.src = src;
    localStorage.setItem("echobase_pfp", src);
  }

  if (pfp) {
    updatePFP(pfp);
  } else {
    updatePFP("https://via.placeholder.com/40");
  }

  // Profile modal
  const profileBtn = document.getElementById("profileBtn");
  const profileModal = document.getElementById("profileModal");

  profileBtn.addEventListener("click", () => {
    modalUsername.innerText = username;
    profileModal.style.display = "block";
  });

  function closeProfile(){
    profileModal.style.display = "none";
  }

  function changePFP(){
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.click();

    fileInput.onchange = () => {
      const file = fileInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => updatePFP(reader.result);
      reader.readAsDataURL(file);
    }
  }

  // Load feed
  let feed = JSON.parse(localStorage.getItem("echobase_feed")) || [];

  function postEcho() {
    const text = document.getElementById("echoInput").value.trim();
    if (!text) return;

    const post = {
      user: username,
      content: text
    };

    feed.unshift(post);
    localStorage.setItem("echobase_feed", JSON.stringify(feed));
    document.getElementById("echoInput").value = "";
    renderFeed();
  }

  function renderFeed() {
    const feedDiv = document.getElementById("feed");
    feedDiv.innerHTML = "";

    feed.forEach(p => {
      const div = document.createElement("div");
      div.className = "post";

      let postPFP = localStorage.getItem("echobase_pfp") || "https://via.placeholder.com/40";

      div.innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
          <img src="${postPFP}" alt="PFP" style="width:30px; height:30px; border-radius:50%;">
          <div class="user">${p.user}</div>
        </div>
        <div>${p.content}</div>
      `;
      feedDiv.appendChild(div);
    });
  }

  renderFeed();
</script>

</body>
</html>
