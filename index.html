<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ECHOBASE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0d0d14;
      color: white;
    }

    header {
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      background: #12121c;
      text-align: center;
    }

    .container {
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #1a1a2a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #6a5cff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }

    .post {
      background: #151525;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .user {
      font-weight: bold;
      margin-bottom: 6px;
      color: #8f8fff;
    }
  </style>
</head>

<body>

<header>ECHOBASE</header>

<div class="container">
  <textarea id="echoInput" placeholder="What’s your echo?"></textarea>
  <button onclick="postEcho()">Echo</button>

  <div id="feed"></div>
</div>

<script>
  let feed = JSON.parse(localStorage.getItem("echobase_feed")) || [];

  function postEcho() {
    const text = document.getElementById("echoInput").value.trim();
    if (!text) return;

    const post = {
      user: "Guest",
      content: text
    };

    feed.unshift(post);
    localStorage.setItem("echobase_feed", JSON.stringify(feed));
    document.getElementById("echoInput").value = "";
    renderFeed();
  }

  function renderFeed() {
    const feedDiv = document.getElementById("feed");
    feedDiv.innerHTML = "";

    feed.forEach(p => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `<div class="user">${p.user}</div>${p.content}`;
      feedDiv.appendChild(div);
    });
  }

  renderFeed();
</script>

</body>
</html>
