<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ECHOBASE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0d0d14;
      color: white;
    }

    header {
  padding: 12px 16px;        /* Slightly smaller padding */
  background: #12121c;
  display: flex;              /* Make header a flex container */
  align-items: center;        /* Vertically center items */
  gap: 10px;                  /* Space between PFP and username */
  justify-content: flex-start;/* Align items to the left */
}

#userPFP {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
}

#usernameDisplay {
  font-size: 16px;
  font-weight: bold;
  color: #8f8fff;
}

    .container {
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #1a1a2a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #6a5cff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
    }

    .post {
      background: #151525;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .user {
      font-weight: bold;
      color: #8f8fff;
    }
  </style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <img id="userPFP" src="" alt="PFP">
    <div id="usernameDisplay" style="font-size:16px; font-weight:bold;"></div>
  </div>
</header>

<div class="container">
  <textarea id="echoInput" placeholder="What’s your echo?"></textarea>
  <button onclick="postEcho()">Echo</button>

  <div id="feed"></div>
</div>

<script>
  // Load username and profile photo
  let username = localStorage.getItem("echobase_username");
  let pfp = localStorage.getItem("echobase_pfp");

  if (!username) {
    username = prompt("Choose a username for ECHOBASE:") || "Guest";
    localStorage.setItem("echobase_username", username);
  }

  document.getElementById("usernameDisplay").innerText = "@" + username;

  const userPFPImg = document.getElementById("userPFP");
  if (pfp) {
    userPFPImg.src = pfp;
  } else {
    userPFPImg.src = "https://via.placeholder.com/40"; // default avatar
  }

  // Click to change PFP
  userPFPImg.addEventListener("click", () => {
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.click();

    fileInput.onchange = () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        localStorage.setItem("echobase_pfp", reader.result);
        userPFPImg.src = reader.result;
        renderFeed(); // update PFP on posts
      };
      reader.readAsDataURL(file);
    };
  });

  // Load feed
  let feed = JSON.parse(localStorage.getItem("echobase_feed")) || [];

  function postEcho() {
    const text = document.getElementById("echoInput").value.trim();
    if (!text) return;

    const post = {
      user: username,
      content: text
    };

    feed.unshift(post);
    localStorage.setItem("echobase_feed", JSON.stringify(feed));
    document.getElementById("echoInput").value = "";
    renderFeed();
  }

  function renderFeed() {
    const feedDiv = document.getElementById("feed");
    feedDiv.innerHTML = "";

    feed.forEach(p => {
      const div = document.createElement("div");
      div.className = "post";

      let postPFP = localStorage.getItem("echobase_pfp") || "https://via.placeholder.com/40";

      div.innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
          <img src="${postPFP}" alt="PFP" style="width:30px; height:30px; border-radius:50%;">
          <div class="user">${p.user}</div>
        </div>
        <div>${p.content}</div>
      `;
      feedDiv.appendChild(div);
    });
  }

  renderFeed();
</script>

</body>
</html>
